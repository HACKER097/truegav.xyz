<nav class="site-nav" id="site-nav">
  <a href="{{ .Site.Home.RelPermalink }}" class="nav-logo">{{ .Site.Title }}</a>
  <ul class="nav-links">
    {{ range .Site.Menus.main }}
    <li><a href="{{ .URL }}">{{ .Name }}</a></li>
    {{ end }}
    {{ with .Site.Home.OutputFormats.Get "rss" }}
    <li><a href="{{ .RelPermalink }}">RSS</a></li>
    {{ end }}
  </ul>
</nav>
