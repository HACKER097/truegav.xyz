{{ define "main" }}
<div class="page-head">
  <span class="page-label">{{ .Title | lower }}</span>
  <span class="page-count">{{ len .Pages }}</span>
</div>
<div class="post-list">
  {{ range $index, $post := .Pages }}
  <a href="{{ .RelPermalink }}" class="post{{ if eq $index 0 }} post-first{{ end }}">
    <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
    <span class="post-title">{{ .Title }}</span>
    <span class="post-meta">
      {{ with .Params.tags }}<span class="post-tags">{{ delimit . " · " }}</span>{{ end }}
    </span>
  </a>
  {{ end }}
</div>
{{ end }}
