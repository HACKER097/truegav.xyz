{{ define "main" }}
<h1>{{ .Title }}</h1>
<div class="post-list">
  {{ range .Pages }}
  <a href="{{ .RelPermalink }}" class="post">
    <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
    <span class="post-title">{{ .Title }}</span>
    {{ with .Params.tags }}<span class="post-tags">{{ delimit . " · " }}</span>{{ end }}
  </a>
  {{ end }}
</div>
{{ end }}
