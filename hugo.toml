baseURL = "/"
locale = "en-us"
title = "truegav"
theme = "mock1"

[params]
  description = "a minimal blog"
  author = "truegav"

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
  [markup.highlight]
    codeFences = true
    noClasses = false
    lineNos = false

[related]
  includeNewer = false
  threshold = 80
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "keywords"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

[menu]
  [[menu.main]]
    name = "posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "tags"
    url = "/tags/"
    weight = 2
